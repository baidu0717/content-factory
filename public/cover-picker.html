<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面选图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  }

  /* ── 手机外壳 ── */
  .phone {
    width: 375px;
    background: #fff;
    border-radius: 44px;
    box-shadow: 0 0 0 10px #222, 0 0 0 12px #3a3a3a, 0 30px 60px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .notch {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }
  .notch-pill {
    width: 120px;
    height: 34px;
    background: #111;
    border-radius: 20px;
  }

  /* ── 小红书顶栏 ── */
  .xhs-header {
    padding: 6px 16px 8px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #f0f0f0;
  }
  .tabs { display: flex; gap: 16px; flex: 1; }
  .tab { font-size: 15px; color: #999; }
  .tab.active {
    color: #111;
    font-weight: 700;
    border-bottom: 2px solid #ff2442;
    padding-bottom: 2px;
  }
  .search-btn {
    width: 22px; height: 22px;
    background: #f5f5f5;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }

  /* ── Feed 网格 ── */
  .feed {
    background: #f5f5f5;
    padding: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    min-height: 560px;
  }

  /* ── 卡片 ── */
  .card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
  }
  .cover {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    display: block;
  }
  .cover-empty {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: #efefef;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    opacity: 0.3;
  }
  .card-body {
    padding: 6px 8px 8px;
  }
  .card-title {
    width: 100%;
    font-size: 12px;
    color: #333;
    line-height: 1.4;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    background: transparent;
    margin-bottom: 4px;
    height: 2.8em;
    overflow: hidden;
  }
  .card-title::placeholder { color: #ccc; }
  .card-footer {
    display: flex;
    justify-content: flex-end;
  }
  .heart { color: #ff2442; font-size: 14px; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"><div class="notch-pill"></div></div>

  <div class="xhs-header">
    <div class="tabs">
      <span class="tab">关注</span>
      <span class="tab active">发现</span>
      <span class="tab">上海</span>
    </div>
    <div class="search-btn">🔍</div>
  </div>

  <div class="feed" id="feed">
    <!-- 4 张空卡片，JS 会把拖入的图片填进来 -->
    <div class="card" data-slot="0">
      <!-- JS replaces this div with <img class="cover"> on drop -->
      <div class="cover-empty">🖼</div>
      <div class="card-body">
        <textarea class="card-title" placeholder="点击输入笔记标题…"></textarea>
        <div class="card-footer"><span class="heart">♡</span></div>
      </div>
    </div>
    <div class="card" data-slot="1">
      <!-- JS replaces this div with <img class="cover"> on drop -->
      <div class="cover-empty">🖼</div>
      <div class="card-body">
        <textarea class="card-title" placeholder="点击输入笔记标题…"></textarea>
        <div class="card-footer"><span class="heart">♡</span></div>
      </div>
    </div>
    <div class="card" data-slot="2">
      <!-- JS replaces this div with <img class="cover"> on drop -->
      <div class="cover-empty">🖼</div>
      <div class="card-body">
        <textarea class="card-title" placeholder="点击输入笔记标题…"></textarea>
        <div class="card-footer"><span class="heart">♡</span></div>
      </div>
    </div>
    <div class="card" data-slot="3">
      <!-- JS replaces this div with <img class="cover"> on drop -->
      <div class="cover-empty">🖼</div>
      <div class="card-body">
        <textarea class="card-title" placeholder="点击输入笔记标题…"></textarea>
        <div class="card-footer"><span class="heart">♡</span></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // 当前待填的槽位索引（0-3）
  let nextSlot = 0;

  // 把一张图片的 dataURL 填入指定槽位
  function fillSlot(slot, dataUrl) {
    const card = document.querySelector(`.card[data-slot="${slot}"]`);
    if (!card) return;

    // 移除占位 div，插入真实 img
    const empty = card.querySelector('.cover-empty');
    if (empty) {
      const img = document.createElement('img');
      img.className = 'cover';
      img.src = dataUrl;
      card.insertBefore(img, empty);
      empty.remove();
    } else {
      // 已有图片则替换 src
      card.querySelector('.cover').src = dataUrl;
    }
  }

  // 读取 File 对象并填入下一个空槽
  function loadFile(file) {
    if (!file.type.startsWith('image/')) return;
    if (nextSlot > 3) return; // 4 格全满后忽略（Task 3 会改掉这个限制）

    const slot = nextSlot;
    nextSlot++;

    const reader = new FileReader();
    reader.onload = (e) => fillSlot(slot, e.target.result);
    reader.readAsDataURL(file);
  }

  // ── 全页面拖拽监听 ──
  // 阻止浏览器默认行为（否则会打开图片）
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = Array.from(e.dataTransfer.files);
    files.forEach(loadFile);
  });

  // 拖拽进入时给手机框加个高亮提示
  document.addEventListener('dragenter', () => {
    document.querySelector('.phone').style.boxShadow =
      '0 0 0 10px #222, 0 0 0 12px #ff2442, 0 30px 60px rgba(0,0,0,0.6)';
  });
  document.addEventListener('dragleave', (e) => {
    // 只在鼠标完全离开 viewport 时取消高亮
    if (e.clientX === 0 && e.clientY === 0) resetHighlight();
  });
  document.addEventListener('drop', resetHighlight);

  function resetHighlight() {
    document.querySelector('.phone').style.boxShadow =
      '0 0 0 10px #222, 0 0 0 12px #3a3a3a, 0 30px 60px rgba(0,0,0,0.6)';
  }
})();
</script>

</body>
</html>
